name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/CLAUDE.md"
      - "**/AGENTS.md"
      - ".claude/**"
      - ".editorconfig"
      - ".github/**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/CLAUDE.md"
      - "**/AGENTS.md"
      - ".claude/**"
      - ".editorconfig"
      - ".github/**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    uses: cboone/gh-actions/.github/workflows/go-ci.yml@v2
    with:
      runs-on: macos-latest
      run-lint: true
      run-build: true
      run-format-check: true

  text-lint:
    uses: cboone/gh-actions/.github/workflows/text-lint.yml@v1

  shell-lint:
    uses: cboone/gh-actions/.github/workflows/shell-lint.yml@v1

  github-lint:
    uses: cboone/gh-actions/.github/workflows/github-lint.yml@v1

  test-scrut:
    name: Test CLI (Scrut)
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: cboone/gh-actions/actions/setup-scrut@v1

      - name: Run scrut CLI tests
        run: make test-scrut

      - name: Run snappy-ez scrut tests
        run: make test-scrut-ez

      - name: Run install.sh scrut tests
        run: make test-scrut-install

      - name: Lint man page
        run: make lint-man

  test-install:
    name: Test install.sh
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Run install.sh against a real release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: make test-install
