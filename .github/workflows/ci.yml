name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "**/CLAUDE.md"
      - "**/AGENTS.md"
      - ".claude/**"
      - ".editorconfig"
      - ".github/**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - "docs/**"
      - "LICENSE"
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/CLAUDE.md"
      - "**/AGENTS.md"
      - ".claude/**"
      - ".editorconfig"
      - ".github/**/*.md"
      - ".github/ISSUE_TEMPLATE/**"
      - ".github/PULL_REQUEST_TEMPLATE/**"
      - "docs/**"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: make test

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci

      - name: Install shfmt
        run: go install mvdan.cc/sh/v3/cmd/shfmt@v3.12.0

      - name: Run vet
        run: make vet

      - name: Check formatting
        run: make fmt-check

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.10.1

      - name: Lint Markdown
        run: make lint-md

      - name: Actionlint
        uses: raven-actions/actionlint@v2

  test-scrut:
    name: Test CLI (Scrut)
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install scrut
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "${HOME}/.local/bin"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"
          gh release download v0.4.3 --repo facebookincubator/scrut --pattern 'scrut-v0.4.3-macos-aarch64.tar.gz' --dir /tmp
          tar -xzf /tmp/scrut-v0.4.3-macos-aarch64.tar.gz -C /tmp
          cp /tmp/scrut-macos-aarch64/scrut "${HOME}/.local/bin/"

      - name: Run scrut CLI tests
        run: make test-scrut

      - name: Run snappy-ez scrut tests
        run: make test-scrut-ez

      - name: Run install.sh scrut tests
        run: make test-scrut-install

  test-install:
    name: Test install.sh
    runs-on: macos-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Run install.sh against a real release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: make test-install
