version: 2

before:
  hooks:
    - make completions

builds:
  - main: .
    binary: snappy
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - completions/*

checksum:
  name_template: checksums.txt

release:
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - name: snappy-tm
    repository:
      owner: cboone
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/cboone/snappy"
    description: "Automatically increase your Time Machine snapshot frequency (macOS only)"
    binaries:
      - snappy
    url:
      verified: "github.com/cboone/snappy"
    # Literal \n sequences are used because GoReleaser's cask template splits multi-line
    # caveats into separate Ruby expressions, causing only the last line to display.
    caveats: 'To run snappy automatically in the background:\n  snappy service install\n\nTo stop the background service:\n  snappy service uninstall'
    hooks:
      post:
        install: |
          system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/snappy"]
          system_command "/bin/mkdir", args: ["-p", "#{HOMEBREW_PREFIX}/etc/bash_completion.d"]
          system_command "/bin/cp", args: ["#{staged_path}/completions/snappy.bash", "#{HOMEBREW_PREFIX}/etc/bash_completion.d/snappy"]
          system_command "/bin/mkdir", args: ["-p", "#{HOMEBREW_PREFIX}/share/zsh/site-functions"]
          system_command "/bin/cp", args: ["#{staged_path}/completions/_snappy", "#{HOMEBREW_PREFIX}/share/zsh/site-functions/_snappy"]
          system_command "/bin/mkdir", args: ["-p", "#{HOMEBREW_PREFIX}/share/fish/vendor_completions.d"]
          system_command "/bin/cp", args: ["#{staged_path}/completions/snappy.fish", "#{HOMEBREW_PREFIX}/share/fish/vendor_completions.d/snappy.fish"]
    uninstall:
      launchctl:
        - com.cboone.snappy
