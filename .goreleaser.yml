version: 2

builds:
  - main: .
    binary: snappy
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

release:
  prerelease: auto

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  - repository:
      owner: cboone
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/cboone/snappy"
    description: "Automatically increase your Time Machine snapshot frequency (macOS only)"
    binaries:
      - snappy
    url:
      verified: "github.com/cboone/snappy"
    caveats: |
      To run snappy automatically in the background:
        snappy service install

      To stop the background service:
        snappy service uninstall
    hooks:
      post:
        install:
          - 'xattr -dr com.apple.quarantine "#{staged_path}/snappy"'
    uninstall:
      launchctl:
        - com.cboone.snappy
